<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录诊断</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #1a1a2e; color: #eee; }
    .card { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin: 5px 0; background: #0f3460; color: #fff; border: 1px solid #e94560; border-radius: 4px; }
    button { background: #e94560; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #ff6b6b; }
    pre { background: #0f3460; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>登录诊断工具</h1>
  
  <div class="card">
    <h2>管理员登录</h2>
    <input type="email" id="email" value="admin@worldcup.bet" placeholder="邮箱">
    <input type="password" id="password" value="Admin@2026!" placeholder="密码">
    <br><br>
    <button onclick="testLogin()">测试登录</button>
  </div>
  
  <div class="card">
    <h3>诊断结果</h3>
    <pre id="result">点击按钮开始诊断...</pre>
  </div>
  
  <div class="card">
    <h3>快速复制</h3>
    <p>邮箱: <code>admin@worldcup.bet</code></p>
    <p>密码: <code>Admin@2026!</code></p>
    <p class="info">注意：密码区分大小写，A是大写</p>
  </div>

  <script>
    async function testLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');
      
      result.innerHTML = '正在测试...\n';
      result.innerHTML += `发送数据: ${JSON.stringify({ email, password: '***' })}\n\n`;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        result.innerHTML += `状态码: ${res.status}\n`;
        result.innerHTML += `响应: ${JSON.stringify(data, null, 2)}\n\n`;
        
        if (data.code === 0) {
          result.innerHTML += `<span class="success">✓ 登录成功!</span>\n`;
          result.innerHTML += `用户: ${data.data.user.username} (${data.data.user.role})\n`;
          result.innerHTML += `Token: ${data.data.accessToken.substring(0, 50)}...\n`;
        } else {
          result.innerHTML += `<span class="error">✗ 登录失败: ${data.message}</span>\n`;
        }
      } catch (e) {
        result.innerHTML += `<span class="error">✗ 网络错误: ${e.message}</span>\n`;
      }
    }
  </script>
</body>
</html>
