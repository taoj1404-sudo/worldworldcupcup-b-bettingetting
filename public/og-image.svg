      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5af19"/>
      <stop offset="100%" style="stop-color:#f12711"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Trophy -->
  <path d="M600 150 L650 150 L650 200 L600 220 L550 200 L550 150 Z" fill="url(#gold)"/>
  <rect x="580" y="220" width="40" height="60" fill="url(#gold)"/>
  <rect x="560" y="280" width="80" height="30" rx="5" fill="url(#gold)"/>
  <rect x="540" y="310" width="120" height="20" rx="3" fill="url(#gold)"/>
  <!-- Soccer balls -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#fff" stroke-width="3" opacity="0.3"/>
  <circle cx="1000" cy="250" r="40" fill="none" stroke="#fff" stroke-width="3" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fff" text-anchor="middle">WorldCup 竞猜</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="32" fill="#f5af19" text-anchor="middle">五大联赛 · 实时竞猜 · 丰厚奖金</text>
</svg>
