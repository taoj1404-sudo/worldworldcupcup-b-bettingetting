<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>纯 HTML 登录测试</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
    input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    button { padding: 10px 20px; background: #0070f3; color: white; border: none; cursor: pointer; width: 100%; }
    button:hover { background: #0051cc; }
    #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h2>纯 HTML 登录测试</h2>
  <p>这个页面直接调用 API，不依赖 React/Next.js</p>
  
  <input type="email" id="email" value="admin@worldcup.bet" placeholder="邮箱"><br>
  <input type="password" id="password" value="Admin@2026!" placeholder="密码"><br>
  <button onclick="doLogin()">登录</button>
  
  <div id="result"></div>

  <script>
    async function doLogin() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const result = document.getElementById('result')
      
      result.innerHTML = '请求中...'
      
      try {
        // 直接调用 API
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        
        const data = await res.json()
        
        // 显示完整响应
        result.innerHTML = '<h4>API 响应:</h4>'
        result.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>'
        
        // 检查是否成功
        if (data.code === 0) {
          result.innerHTML += '<p class="success">✓ 登录成功!</p>'
          result.innerHTML += '<p>用户角色: <strong>' + data.data.user.role + '</strong></p>'
          
          // 检查角色
          if (data.data.user.role === 'admin') {
            result.innerHTML += '<p class="success">✓ 角色是 admin，应该跳转到 /admin</p>'
            result.innerHTML += '<p><a href="/admin">点击这里跳转到 /admin</a></p>'
          } else {
            result.innerHTML += '<p class="error">✗ 角色不是 admin!</p>'
          }
        } else {
          result.innerHTML += '<p class="error">✗ 登录失败: ' + data.message + '</p>'
        }
        
      } catch (err) {
        result.innerHTML = '<p class="error">请求失败: ' + err.message + '</p>'
        result.innerHTML += '<p>请确保:</p>'
        result.innerHTML += '<ul><li>服务器正在运行 (npm run dev)</li><li>端口是 3000</li></ul>'
      }
    }
  </script>
</body>
</html>
