<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录测试</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #0070f3; color: white; border: none; cursor: pointer; }
    button:hover { background: #0051cc; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; max-height: 400px; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>管理员登录测试</h1>
  
  <div class="form-group">
    <label>邮箱:</label>
    <input type="email" id="email" value="admin@worldcup.bet">
  </div>
  
  <div class="form-group">
    <label>密码:</label>
    <input type="password" id="password" value="Admin@2026!">
  </div>
  
  <button onclick="testLogin()">测试登录</button>
  
  <h3>响应结果:</h3>
  <pre id="result">点击"测试登录"查看结果...</pre>
  
  <h3>角色检查:</h3>
  <div id="roleCheck"></div>

  <script>
    async function testLogin() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const resultEl = document.getElementById('result')
      const roleCheckEl = document.getElementById('roleCheck')
      
      resultEl.textContent = '请求中...'
      roleCheckEl.innerHTML = ''
      
      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        
        const data = await res.json()
        resultEl.textContent = JSON.stringify(data, null, 2)
        
        // 模拟 AuthPage.tsx 的逻辑
        if (data.code === 0 && data.data) {
          const user = data.data.user
          if (user && user.role === 'admin') {
            roleCheckEl.innerHTML = '<p class="success">✓ 角色检查通过！应该重定向到 /admin</p>'
            roleCheckEl.innerHTML += '<p>user.role = ' + user.role + '</p>'
            roleCheckEl.innerHTML += '<p><button onclick="window.location.href=\'/admin\'">手动跳转到 /admin</button></p>'
          } else {
            roleCheckEl.innerHTML = '<p class="error">✗ 角色检查失败！会重定向到 /</p>'
            roleCheckEl.innerHTML += '<p>user = ' + JSON.stringify(user) + '</p>'
          }
        } else {
          roleCheckEl.innerHTML = '<p class="error">登录失败: ' + (data.message || '未知错误') + '</p>'
        }
      } catch (err) {
        resultEl.textContent = '错误: ' + err.message
        roleCheckEl.innerHTML = '<p class="error">请求失败，请确保服务器正在运行 (npm run dev)</p>'
      }
    }
  </script>
</body>
</html>
